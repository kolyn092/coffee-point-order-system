name: coffee-point-order-load-test

services:
  mysql:
    image: mysql:8.0.36
    environment:
      MYSQL_DATABASE: coffee_point_order
      MYSQL_USER: coffee
      MYSQL_PASSWORD: coffee
      MYSQL_ROOT_PASSWORD: root
      TZ: UTC
    command:
      - --default-time-zone=+00:00
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_bin
    volumes:
      - load-test-mysql-data:/var/lib/mysql
    healthcheck:
      test:
        - CMD-SHELL
        - mysqladmin ping -h 127.0.0.1 -u root -p$${MYSQL_ROOT_PASSWORD} --silent
      interval: 5s
      timeout: 5s
      retries: 30

  redis:
    image: redis:7.2-alpine
    command:
      - redis-server
      - --appendonly
      - "yes"
    volumes:
      - load-test-redis-data:/data
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 5s
      timeout: 3s
      retries: 30

  kafka:
    image: apache/kafka:3.9.0
    environment:
      CLUSTER_ID: 4L6g3nShT-eMCtK--X86sw
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_LISTENERS: CONTROLLER://:9093,INTERNAL://:9092,EXTERNAL://:29092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
    volumes:
      - load-test-kafka-data:/var/lib/kafka/data
    healthcheck:
      test:
        - CMD-SHELL
        - /opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1
      interval: 10s
      timeout: 10s
      retries: 30

  app-1:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DB_HOST: mysql
      REDIS_HOST: redis
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      POPULAR_MENU_CONSUMER_CONCURRENCY: ${LOAD_TEST_APP_1_CONSUMER_CONCURRENCY:-1}
      POPULAR_MENU_CONSUMER_ENABLED: ${LOAD_TEST_APP_1_CONSUMER_ENABLED:-true}
      POPULAR_MENU_CONSUMER_GROUP_ID: ${LOAD_TEST_CONSUMER_GROUP_ID:-popular-menu}
      TZ: UTC
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  app-2:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DB_HOST: mysql
      REDIS_HOST: redis
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      POPULAR_MENU_CONSUMER_CONCURRENCY: ${LOAD_TEST_APP_2_CONSUMER_CONCURRENCY:-1}
      POPULAR_MENU_CONSUMER_ENABLED: ${LOAD_TEST_APP_2_CONSUMER_ENABLED:-true}
      POPULAR_MENU_CONSUMER_GROUP_ID: ${LOAD_TEST_CONSUMER_GROUP_ID:-popular-menu}
      TZ: UTC
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  load-balancer:
    image: nginx:1.27-alpine
    ports:
      - "${LOAD_TEST_HTTP_PORT:-18080}:8080"
    volumes:
      - ./load-test/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app-1
      - app-2

  k6:
    image: grafana/k6:0.54.0
    profiles:
      - tools
    environment:
      K6_BASE_URL: http://load-balancer:8080
    volumes:
      - ./load-test/k6:/scripts:ro
      - ./docs/load-test/results:/results
    entrypoint:
      - k6

volumes:
  load-test-mysql-data:
  load-test-redis-data:
  load-test-kafka-data:
