upstream coffee_point_order_upstream {
    least_conn;
    server app-1:8080;
    server app-2:8080;
}

server {
    listen 8080;

    location / {
        proxy_pass http://coffee_point_order_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
